<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N Weather Widget</title>
  <style>
    :root {
      --ink: #2f3130;
      --muted: rgba(47, 49, 48, 0.56);
      --paper: #fbfaf7;
      --weather: #e7e5e1;
      --accent: #9e9c98;
      --border: rgba(47, 49, 48, 0.1);
      --font: Georgia, "Times New Roman", serif;
      --shadow: 0 18px 40px rgba(47, 49, 48, 0.08);
      --scale: 1;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: var(--ink);
      font-family: var(--font);
      letter-spacing: 0;
    }

    body { padding: calc(12px * var(--scale)); }

    .widget {
      width: min(100%, calc(620px * var(--scale)));
      margin: 0 auto;
      padding: calc(18px * var(--scale));
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .location {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    summary,
    button {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }

    summary {
      list-style: none;
      padding: 7px 11px;
    }

    summary::-webkit-details-marker { display: none; }
    details { position: relative; z-index: 2; flex: 0 0 auto; }

    .settings {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(460px, calc(100vw - 34px));
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    label span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    select,
    input[type="number"],
    input {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
    }

    select,
    input[type="text"],
    input[type="number"] { padding: 0 8px; }
    input[type="color"] { padding: 3px; cursor: pointer; }

    .color-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 6px;
    }

    .setting-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 9px;
    }

    .setting-actions button {
      min-height: 31px;
      padding: 0 12px;
    }

    .weather {
      padding: calc(20px * var(--scale));
      border-radius: 10px;
      background: var(--weather);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .current {
      display: grid;
      grid-template-columns: calc(168px * var(--scale)) minmax(0, 1fr);
      gap: calc(24px * var(--scale));
      align-items: center;
      margin-bottom: calc(20px * var(--scale));
    }

    .icon {
      width: calc(152px * var(--scale));
      height: calc(132px * var(--scale));
      display: grid;
      place-items: center;
      justify-self: center;
    }

    .weather-art {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .weather-art .line {
      fill: none;
      stroke: var(--ink);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.72;
    }

    .weather-art .thin {
      stroke-width: 3;
      opacity: 0.38;
    }

    .weather-art .sun-halo { fill: #fff0c6; }
    .weather-art .sun-core { fill: #f1bd55; }
    .weather-art .sun-ray {
      stroke: #d89d35;
      stroke-width: 5;
      stroke-linecap: round;
    }
    .weather-art .cloud-shadow { fill: #bbb8b2; }
    .weather-art .cloud-main { fill: #e5e1da; }
    .weather-art .cloud-line {
      fill: none;
      stroke: #8d8982;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .weather-art .umbrella-fill { fill: #87aec9; }
    .weather-art .umbrella-shadow { fill: #628bad; opacity: 0.38; }
    .weather-art .umbrella-line {
      fill: none;
      stroke: #4e6270;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .weather-art .rain-drop { fill: #6ea4c8; }
    .weather-art .heavy-rain {
      stroke: #426d91;
      stroke-width: 5;
      stroke-linecap: round;
    }
    .weather-art .snow-fill {
      fill: none;
      stroke: #8fb9ca;
      stroke-width: 4;
      stroke-linecap: round;
    }
    .weather-art .bolt-fill { fill: #d7aa37; }
    .weather-art .change-mark {
      fill: none;
      stroke: var(--ink);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.46;
    }

    .weather-art-small {
      width: calc(48px * var(--scale));
      height: calc(40px * var(--scale));
      display: block;
      margin: 0 auto;
    }

    .weather-art-small .line {
      stroke-width: 6;
    }

    .weather-art-small .thin {
      stroke-width: 4;
    }

    .weather-art-small .cloud-line,
    .weather-art-small .umbrella-line,
    .weather-art-small .snow-fill {
      stroke-width: 7;
    }

    .weather-art-small .sun-ray {
      stroke-width: 8;
    }

    .temp {
      font-size: clamp(38px, calc(10vw * var(--scale)), calc(78px * var(--scale)));
      line-height: 0.95;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .desc {
      margin-top: calc(6px * var(--scale));
      color: var(--muted);
      font-size: calc(14px * var(--scale));
    }

    .meta {
      margin-top: calc(12px * var(--scale));
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: calc(7px * var(--scale));
    }

    .metric {
      padding: calc(8px * var(--scale)) calc(6px * var(--scale));
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.5);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: calc(9px * var(--scale));
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: calc(3px * var(--scale));
      font-size: calc(13px * var(--scale));
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: calc(7px * var(--scale));
    }

    .day {
      min-width: 0;
      padding: calc(8px * var(--scale)) calc(5px * var(--scale));
      border: 1px solid var(--border);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.46);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .dow {
      color: var(--muted);
      font-size: calc(10px * var(--scale));
      text-transform: uppercase;
    }

    .symbol {
      height: calc(42px * var(--scale));
      margin: calc(4px * var(--scale)) 0;
      display: grid;
      place-items: center;
    }

    .range,
    .rain-chance {
      font-size: calc(10px * var(--scale));
      white-space: nowrap;
    }

    .rain-chance {
      margin-top: 2px;
      color: var(--muted);
    }

    .status {
      margin-top: 8px;
      min-height: 15px;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 520px) {
      body { padding: 8px; }
      .widget { padding: 12px; }
      .settings-grid { grid-template-columns: 1fr; }
      .weather { padding: 14px; }
      .current { grid-template-columns: 1fr; gap: 12px; text-align: center; }
      .icon { justify-self: center; width: 112px; height: 96px; }
      .temp { font-size: 48px; }
      .forecast { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Weather widget">
    <div class="toolbar">
      <div class="location" id="location-label">Kochi</div>
      <details>
        <summary>Settings</summary>
        <div class="settings">
          <div class="settings-grid">
            <label>
              <span>Place</span>
              <select id="place">
                <option value="kochi">Kochi</option>
                <option value="tokyo">Tokyo</option>
                <option value="osaka">Osaka</option>
                <option value="sapporo">Sapporo</option>
                <option value="fukuoka">Fukuoka</option>
                <option value="naha">Naha</option>
                <option value="guam">Guam</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <label>
              <span>Postal / City</span>
              <input id="search" type="text" inputmode="search" autocomplete="postal-code" placeholder="780-0000 or Tokyo" />
            </label>
            <label>
              <span>Font</span>
              <select id="font">
                <option value="serif">Serif</option>
                <option value="modern">Modern</option>
                <option value="mono">Mono</option>
              </select>
            </label>
            <label>
              <span>Size %</span>
              <input id="size" type="number" min="55" max="140" step="1" />
            </label>
            <label>
              <span>Text</span>
              <div class="color-row">
                <input id="text-color" type="color" />
                <button type="button" data-pick="text-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Weather Back</span>
              <div class="color-row">
                <input id="weather-color" type="color" />
                <button type="button" data-pick="weather-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Accent</span>
              <div class="color-row">
                <input id="accent-color" type="color" />
                <button type="button" data-pick="accent-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Page</span>
              <div class="color-row">
                <input id="page-color" type="color" />
                <button type="button" data-pick="page-color" title="Pick color">⌖</button>
              </div>
            </label>
          </div>
          <div class="setting-actions">
            <button type="button" id="set-location">Set location</button>
            <button type="button" id="reset">Reset</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </details>
    </div>

    <section class="weather">
      <div class="current">
        <div class="icon" id="icon" aria-hidden="true"></div>
        <div>
          <div class="temp" id="temp">--</div>
          <div class="desc" id="desc">weather loading</div>
          <div class="meta">
            <div class="metric"><span>High</span><strong id="high">--</strong></div>
            <div class="metric"><span>Low</span><strong id="low">--</strong></div>
            <div class="metric"><span>Rain</span><strong id="rain">--</strong></div>
          </div>
        </div>
      </div>
      <div class="forecast" id="forecast"></div>
    </section>
  </main>

  <script>
    const key = "n-weather-widget-settings-v5";
    const defaults = {
      font: "serif",
      size: 72,
      textColor: "#2f3130",
      weatherColor: "#e7e5e1",
      accentColor: "#9e9c98",
      pageColor: "#fbfaf7",
      place: "kochi",
      custom: null
    };
    const fonts = {
      serif: 'Georgia, "Times New Roman", serif',
      modern: '"Helvetica Neue", Arial, sans-serif',
      mono: '"Courier New", monospace'
    };
    const places = {
      kochi: { id: "kochi", name: "Kochi", lat: 33.5597, lon: 133.5311, timezone: "Asia/Tokyo" },
      tokyo: { id: "tokyo", name: "Tokyo", lat: 35.6762, lon: 139.6503, timezone: "Asia/Tokyo" },
      osaka: { id: "osaka", name: "Osaka", lat: 34.6937, lon: 135.5023, timezone: "Asia/Tokyo" },
      sapporo: { id: "sapporo", name: "Sapporo", lat: 43.0618, lon: 141.3545, timezone: "Asia/Tokyo" },
      fukuoka: { id: "fukuoka", name: "Fukuoka", lat: 33.5902, lon: 130.4017, timezone: "Asia/Tokyo" },
      naha: { id: "naha", name: "Naha", lat: 26.2124, lon: 127.6792, timezone: "Asia/Tokyo" },
      guam: { id: "guam", name: "Guam", lat: 13.4443, lon: 144.7937, timezone: "Pacific/Guam" }
    };
    const weatherText = {
      0: "晴れ",
      1: "晴れ時々くもり",
      2: "くもり時々晴れ",
      3: "くもり",
      45: "霧",
      48: "霧",
      51: "小雨",
      53: "霧雨",
      55: "強い霧雨",
      61: "弱い雨",
      63: "雨",
      65: "強い雨",
      71: "弱い雪",
      73: "雪",
      75: "強い雪",
      80: "にわか雨",
      81: "にわか雨",
      82: "強いにわか雨",
      95: "雷雨",
      96: "雷雨",
      99: "雷雨"
    };

    function validHex(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(value || "") ? value : fallback;
    }

    function validSize(value, fallback = defaults.size) {
      const size = Number(value);
      if (!Number.isFinite(size)) return fallback;
      return Math.min(140, Math.max(55, Math.round(size)));
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(key) || "{}");
        return {
          ...defaults,
          ...saved,
          size: validSize(saved.size),
          textColor: validHex(saved.textColor, defaults.textColor),
          weatherColor: validHex(saved.weatherColor, defaults.weatherColor),
          accentColor: validHex(saved.accentColor, defaults.accentColor),
          pageColor: validHex(saved.pageColor, defaults.pageColor)
        };
      } catch (_) {
        return { ...defaults };
      }
    }

    let settings = load();

    function currentPlace() {
      if (settings.place === "custom" && settings.custom) return settings.custom;
      return places[settings.place] || places.kochi;
    }

    function save() {
      localStorage.setItem(key, JSON.stringify(settings));
    }

    function apply() {
      document.documentElement.style.setProperty("--ink", settings.textColor);
      document.documentElement.style.setProperty("--weather", settings.weatherColor);
      document.documentElement.style.setProperty("--accent", settings.accentColor);
      document.documentElement.style.setProperty("--paper", settings.pageColor);
      document.documentElement.style.setProperty("--font", fonts[settings.font] || fonts.serif);
      document.documentElement.style.setProperty("--scale", settings.size / 100);
      document.getElementById("font").value = settings.font;
      document.getElementById("size").value = settings.size;
      document.getElementById("text-color").value = settings.textColor;
      document.getElementById("weather-color").value = settings.weatherColor;
      document.getElementById("accent-color").value = settings.accentColor;
      document.getElementById("page-color").value = settings.pageColor;
      document.getElementById("place").value = settings.place;
      document.getElementById("location-label").textContent = currentPlace().name;
    }

    function normalizeZip(value) {
      const digits = value.replace(/[^\d]/g, "");
      if (digits.length !== 7) return null;
      return `${digits.slice(0, 3)}-${digits.slice(3)}`;
    }

    async function lookupJapaneseAddress(digits) {
      try {
        const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${digits}`);
        if (!response.ok) return null;
        const data = await response.json();
        const item = data.results && data.results[0];
        if (!item) return null;
        return `${item.address1}${item.address2}${item.address3}`;
      } catch (_) {
        return null;
      }
    }

    async function geocodeByName(value) {
      const url = new URL("https://geocoding-api.open-meteo.com/v1/search");
      url.search = new URLSearchParams({
        name: value,
        count: "1",
        language: "ja",
        format: "json"
      }).toString();
      const response = await fetch(url);
      if (!response.ok) throw new Error("city not found");
      const data = await response.json();
      const hit = data.results && data.results[0];
      if (!hit) throw new Error("city not found");
      return {
        id: "custom",
        name: `${hit.name}${hit.admin1 ? `, ${hit.admin1}` : ""}`,
        lat: Number(hit.latitude),
        lon: Number(hit.longitude),
        timezone: hit.timezone || "Asia/Tokyo"
      };
    }

    async function geocode(value) {
      const status = document.getElementById("status");
      const zip = normalizeZip(value);
      if (zip) {
        const digits = zip.replace("-", "");
        const addressLabel = await lookupJapaneseAddress(digits);
        try {
          const geoResponse = await fetch(`https://api.zippopotam.us/jp/${zip}`);
          if (!geoResponse.ok) throw new Error("postal code not found");
          const geo = await geoResponse.json();
          const place = geo.places && geo.places[0];
          if (!place) throw new Error("postal code not found");
          status.textContent = addressLabel || `${place["place name"]}, ${place.state}`;
          return {
            id: "custom",
            name: addressLabel || `${place["place name"]}, ${place.state}`,
            lat: Number(place.latitude),
            lon: Number(place.longitude),
            timezone: "Asia/Tokyo"
          };
        } catch (_) {
          if (!addressLabel) throw new Error("postal code not found");
          const fallback = await geocodeByName(addressLabel);
          status.textContent = addressLabel;
          return { ...fallback, name: addressLabel, timezone: "Asia/Tokyo" };
        }
      }

      const result = await geocodeByName(value);
      status.textContent = result.name;
      return result;
    }

    function classifyWeather(code, rain = 0) {
      const weatherCode = Number(code);
      const rainChance = Number(rain) || 0;
      if ([95, 96, 99].includes(weatherCode)) return "storm";
      if ([71, 73, 75].includes(weatherCode)) return "snow";
      if ([65, 82].includes(weatherCode)) return "heavyRain";
      if (rainChance >= 70) return "rain";
      if ([61, 63, 80, 81].includes(weatherCode)) return "rain";
      if ([51, 53, 55].includes(weatherCode)) return "cloudOneRain";
      if (weatherCode === 0) return rainChance >= 35 ? "sunOneRain" : "sun";
      if (weatherCode === 1) return rainChance >= 35 ? "sunOneRain" : "sunCloud";
      if (weatherCode === 2) return rainChance >= 50 ? "rainCloud" : rainChance >= 35 ? "cloudOneRain" : "cloudSun";
      if ([3, 45, 48].includes(weatherCode)) return rainChance >= 50 ? "rainCloud" : rainChance >= 35 ? "cloudOneRain" : "cloud";
      return rainChance >= 35 ? "cloudOneRain" : "cloud";
    }

    const weatherLabel = {
      sun: "晴れ",
      sunCloud: "晴れ時々くもり",
      cloudSun: "くもり時々晴れ",
      cloud: "くもり",
      sunOneRain: "晴れ一時雨",
      cloudOneRain: "くもり一時雨",
      rainCloud: "くもり時々雨",
      rain: "雨",
      heavyRain: "強い雨",
      snow: "雪",
      storm: "雷雨"
    };

    function weatherArt(code, small = false, overrideKind = null, rain = 0) {
      const weatherKind = overrideKind || classifyWeather(code, rain);
      const sizeClass = small ? "weather-art weather-art-small" : "weather-art";
      const cloud = `
        <path class="cloud-shadow" d="M30 68c-10 0-18-8-18-18 0-9 7-16 15-17 5-13 17-22 32-22 17 0 30 10 36 25 10 1 18 9 18 20 0 13-10 22-23 22H32Z" opacity="0.42"/>
        <path class="cloud-main" d="M28 64c-9 0-16-7-16-16 0-8 6-15 14-16 4-13 16-22 31-22 16 0 29 10 34 25 10 1 18 9 18 20 0 12-9 21-21 21H30Z"/>
        <path class="cloud-line" d="M28 64c-9 0-16-7-16-16 0-8 6-15 14-16 4-13 16-22 31-22 16 0 29 10 34 25 10 1 18 9 18 20 0 12-9 21-21 21H30"/>
      `;
      const sun = `
        <circle class="sun-halo" cx="60" cy="50" r="35"/>
        <circle class="sun-core" cx="60" cy="50" r="24"/>
        <path class="sun-ray" d="M60 7v14M60 79v14M17 50h14M89 50h14M29 19l10 10M81 71l10 10M91 19 81 29M39 71 29 81"/>
      `;
      const smallSun = `
        <circle class="sun-halo" cx="38" cy="34" r="27"/>
        <circle class="sun-core" cx="38" cy="34" r="18"/>
        <path class="sun-ray" d="M38 3v12M38 53v12M7 34h12M57 34h12M16 12l8 8M52 48l8 8M60 12l-8 8M24 48l-8 8"/>
      `;
      const umbrella = `
        <ellipse class="rain-drop" cx="37" cy="17" rx="4" ry="7" transform="rotate(24 37 17)"/>
        <ellipse class="rain-drop" cx="67" cy="10" rx="4" ry="7" transform="rotate(24 67 10)"/>
        <ellipse class="rain-drop" cx="98" cy="18" rx="4" ry="7" transform="rotate(24 98 18)"/>
        <path class="umbrella-shadow" d="M22 58c8-23 27-35 52-35 23 0 42 13 50 35H22Z"/>
        <path class="umbrella-fill" d="M20 55c9-22 28-34 53-34 24 0 43 12 52 34-12-6-22-6-32 0-10-7-20-7-30 0-10-7-20-7-30 0-5-3-9-4-13 0Z"/>
        <path class="umbrella-line" d="M20 55c9-22 28-34 53-34 24 0 43 12 52 34-12-6-22-6-32 0-10-7-20-7-30 0-10-7-20-7-30 0-5-3-9-4-13 0ZM73 55v30c0 10 15 10 15 0"/>
      `;
      const rainDrops = `
        <ellipse class="rain-drop" cx="38" cy="82" rx="5" ry="8" transform="rotate(24 38 82)"/>
        <ellipse class="rain-drop" cx="63" cy="91" rx="5" ry="8" transform="rotate(24 63 91)"/>
        <ellipse class="rain-drop" cx="91" cy="82" rx="5" ry="8" transform="rotate(24 91 82)"/>
      `;
      const heavyRainDrops = `
        <path class="heavy-rain" d="M30 76l-9 18M49 76l-10 20M68 76l-9 18M91 76l-10 20M110 76l-9 18"/>
        <ellipse class="rain-drop" cx="58" cy="101" rx="5" ry="8" transform="rotate(24 58 101)"/>
        <ellipse class="rain-drop" cx="86" cy="101" rx="5" ry="8" transform="rotate(24 86 101)"/>
      `;
      const tinyUmbrella = `
        <g transform="translate(70 45) scale(.52)">
          ${umbrella}
        </g>
      `;
      const snow = `
        <path class="snow-fill" d="M40 84v14M33 91h14M35 86l10 10M45 86l-10 10M75 84v14M68 91h14M70 86l10 10M80 86l-10 10"/>
      `;
      const storm = `<path class="bolt-fill" d="M58 78h19L62 105l3-19H48l16-29h17Z"/>`;
      const afterArrow = `<path class="change-mark" d="M48 92h34M72 82l11 10-11 10"/>`;

      const bodies = {
        sun,
        sunCloud: `<g transform="translate(8 2)">${smallSun}</g><g transform="translate(12 24) scale(.88)">${cloud}</g>`,
        cloudSun: `<g transform="translate(2 4) scale(.76)">${smallSun}</g><g transform="translate(18 24) scale(.84)">${cloud}</g>`,
        cloud: `<g transform="translate(8 12) scale(.92)">${cloud}</g>`,
        sunOneRain: `<g transform="translate(3 3) scale(.86)">${sun}</g>${tinyUmbrella}`,
        cloudOneRain: `<g transform="translate(8 10) scale(.86)">${cloud}</g>${tinyUmbrella}`,
        rainCloud: `<g transform="translate(8 4) scale(.9)">${cloud}${rainDrops}</g>`,
        rain: `<g transform="translate(2 0) scale(.96)">${umbrella}${rainDrops}</g>`,
        heavyRain: `<g transform="translate(2 0) scale(.96)">${umbrella}${heavyRainDrops}</g>`,
        snow: `<g transform="translate(8 2) scale(.92)">${cloud}${snow}</g>`,
        storm: `<g transform="translate(8 1) scale(.92)">${cloud}${storm}</g>`,
        sunAfterCloud: `<g transform="translate(-2 0) scale(.78)">${sun}</g>${afterArrow}<g transform="translate(50 28) scale(.58)">${cloud}</g>`,
        cloudAfterRain: `<g transform="translate(0 12) scale(.72)">${cloud}</g>${afterArrow}<g transform="translate(76 48) scale(.44)">${umbrella}</g>`
      };

      return `<svg class="${sizeClass}" viewBox="0 0 132 112" aria-hidden="true" focusable="false">${bodies[weatherKind] || bodies.cloud}</svg>`;
    }

    function renderIcon(code, rain) {
      document.getElementById("icon").innerHTML = weatherArt(code, false, null, rain);
    }

    function formatWeekday(dateText, timezone) {
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: timezone,
        weekday: "short"
      }).format(new Date(`${dateText}T12:00:00`));
    }

    function renderForecast(daily, tempUnit, timezone) {
      document.getElementById("forecast").innerHTML = daily.time.slice(0, 7).map((dateText, index) => {
        const max = Math.round(daily.temperature_2m_max[index]);
        const min = Math.round(daily.temperature_2m_min[index]);
        const rain = daily.precipitation_probability_max[index] ?? 0;
        const code = Number(daily.weather_code[index]);
        const iconKind = classifyWeather(code, rain);
        return `
          <div class="day">
            <div class="dow">${index === 0 ? "今日" : formatWeekday(dateText, timezone)}</div>
            <div class="symbol">${weatherArt(code, true, iconKind, rain)}</div>
            <div class="range">${max}/${min}${tempUnit}</div>
            <div class="rain-chance">${rain}%</div>
          </div>
        `;
      }).join("");
    }

    async function updateWeather() {
      const place = currentPlace();
      const url = new URL("https://api.open-meteo.com/v1/forecast");
      url.search = new URLSearchParams({
        latitude: String(place.lat),
        longitude: String(place.lon),
        current: "temperature_2m,apparent_temperature,weather_code,wind_speed_10m",
        daily: "temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max",
        timezone: place.timezone
      }).toString();
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("weather unavailable");
        const data = await response.json();
        const current = data.current;
        const daily = data.daily;
        const tempUnit = data.current_units.temperature_2m || "°C";
        const code = Number(current.weather_code);
        const todayRain = daily.precipitation_probability_max[0] ?? 0;
        const displayKind = classifyWeather(code, todayRain);
        document.getElementById("temp").textContent = `${Math.round(current.temperature_2m)}${tempUnit}`;
        document.getElementById("desc").textContent = weatherLabel[displayKind] || weatherText[code] || "天気";
        document.getElementById("high").textContent = `${Math.round(daily.temperature_2m_max[0])}${tempUnit}`;
        document.getElementById("low").textContent = `${Math.round(daily.temperature_2m_min[0])}${tempUnit}`;
        document.getElementById("rain").textContent = `${todayRain}%`;
        renderIcon(code, todayRain);
        renderForecast(daily, tempUnit, place.timezone);
      } catch (_) {
        document.getElementById("desc").textContent = "天気を取得できませんでした";
        document.getElementById("forecast").innerHTML = "";
      }
    }

    async function pickColor(id) {
      if (!window.EyeDropper) {
        document.getElementById(id).click();
        return;
      }
      try {
        const result = await new EyeDropper().open();
        document.getElementById(id).value = result.sRGBHex;
        document.getElementById(id).dispatchEvent(new Event("input", { bubbles: true }));
      } catch (_) {}
    }

    ["font", "size", "text-color", "weather-color", "accent-color", "page-color"].forEach((id) => {
      const input = document.getElementById(id);
      input.addEventListener(input.type === "color" ? "input" : "change", () => {
        const map = {
          font: "font",
          size: "size",
          "text-color": "textColor",
          "weather-color": "weatherColor",
          "accent-color": "accentColor",
          "page-color": "pageColor"
        };
        settings = { ...settings, [map[id]]: id === "size" ? validSize(input.value) : input.value };
        apply();
        save();
      });
    });

    document.getElementById("place").addEventListener("change", () => {
      settings = { ...settings, place: document.getElementById("place").value };
      apply();
      save();
      updateWeather();
    });

    document.getElementById("set-location").addEventListener("click", async () => {
      const value = document.getElementById("search").value.trim();
      if (!value) {
        document.getElementById("status").textContent = "郵便番号または地名を入力してください。";
        return;
      }
      document.getElementById("status").textContent = "searching...";
      try {
        const custom = await geocode(value);
        settings = { ...settings, place: "custom", custom };
        apply();
        save();
        await updateWeather();
      } catch (_) {
        document.getElementById("status").textContent = "地域を見つけられませんでした。";
      }
    });

    document.querySelectorAll("[data-pick]").forEach((button) => {
      button.addEventListener("click", () => pickColor(button.dataset.pick));
    });

    document.getElementById("reset").addEventListener("click", () => {
      settings = { ...defaults };
      apply();
      save();
      updateWeather();
    });

    apply();
    updateWeather();
    setInterval(updateWeather, 1000 * 60 * 30);
  </script>
</body>
</html>
