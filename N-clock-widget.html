<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N Clock Widget</title>
  <style>
    :root {
      --ink: #2f3130;
      --muted: rgba(47, 49, 48, 0.58);
      --card: #c4b5a2;
      --card-ink: #ffffff;
      --paper: #fbfaf7;
      --line: rgba(255, 255, 255, 0.34);
      --border: rgba(47, 49, 48, 0.12);
      --font: Georgia, "Times New Roman", serif;
      --soft-shadow: 0 18px 40px rgba(47, 49, 48, 0.08);
      --scale: 1;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: var(--ink);
      font-family: var(--font);
      letter-spacing: 0;
    }

    body { padding: calc(12px * var(--scale)); }

    .widget {
      width: min(100%, calc(430px * var(--scale)));
      margin: 0 auto;
      padding: calc(18px * var(--scale));
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--soft-shadow);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    details { position: relative; z-index: 2; }

    summary {
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 11px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    .settings {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(360px, calc(100vw - 34px));
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: var(--soft-shadow);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    label span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    select,
    input[type="number"],
    input[type="color"] {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
    }

    select,
    input[type="number"] { padding: 0 8px; }
    input[type="color"] { padding: 3px; cursor: pointer; }

    .color-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 6px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }

    .reset-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 9px;
    }

    .reset-row button {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 11px;
    }

    .clock {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-height: calc(180px * var(--scale));
      overflow: hidden;
      border-radius: 10px;
      background: var(--card);
      color: var(--card-ink);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
      position: relative;
    }

    .clock::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--line);
      pointer-events: none;
    }

    .tile {
      min-width: 0;
      min-height: calc(180px * var(--scale));
      display: grid;
      place-items: center;
      position: relative;
    }

    .tile + .tile { border-left: 1px solid rgba(255, 255, 255, 0.16); }

    .number {
      font-size: clamp(42px, calc(18vw * var(--scale)), calc(94px * var(--scale)));
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .caption {
      position: absolute;
      left: calc(14px * var(--scale));
      right: calc(14px * var(--scale));
      bottom: calc(13px * var(--scale));
      font-size: calc(13px * var(--scale));
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .tile:last-child .caption {
      text-align: right;
      font-size: calc(11px * var(--scale));
    }

    .date {
      margin-top: calc(10px * var(--scale));
      color: var(--muted);
      font-size: calc(12px * var(--scale));
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    body.style-minimal .clock {
      display: block;
      min-height: 154px;
      padding: calc(26px * var(--scale));
      text-align: center;
    }

    body.style-minimal .tile {
      min-height: 0;
      display: inline;
    }

    body.style-minimal .tile + .tile { border-left: 0; }
    body.style-minimal .number { font-size: clamp(42px, calc(17vw * var(--scale)), calc(88px * var(--scale))); }
    body.style-minimal .caption { position: static; display: block; margin-top: calc(10px * var(--scale)); text-align: center; }
    body.style-minimal .clock::after { display: none; }

    @media (max-width: 360px) {
      body { padding: 8px; }
      .widget { padding: 12px; }
      .settings-grid { grid-template-columns: 1fr; }
      .number { font-size: 54px; }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Clock widget">
    <div class="toolbar">
      <details>
        <summary>Settings</summary>
        <div class="settings">
          <div class="settings-grid">
            <label>
              <span>Time</span>
              <select id="time-format">
                <option value="12">12h</option>
                <option value="24">24h</option>
              </select>
            </label>
            <label>
              <span>Font</span>
              <select id="font">
                <option value="serif">Serif</option>
                <option value="modern">Modern</option>
                <option value="mono">Mono</option>
              </select>
            </label>
            <label>
              <span>Style</span>
              <select id="style">
                <option value="split">Split card</option>
                <option value="minimal">Minimal</option>
              </select>
            </label>
            <label>
              <span>Size %</span>
              <input id="size" type="number" min="55" max="140" step="1" />
            </label>
            <label>
              <span>Text</span>
              <div class="color-row">
                <input id="text-color" type="color" />
                <button type="button" data-pick="text-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Back</span>
              <div class="color-row">
                <input id="back-color" type="color" />
                <button type="button" data-pick="back-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Page</span>
              <div class="color-row">
                <input id="page-color" type="color" />
                <button type="button" data-pick="page-color" title="Pick color">⌖</button>
              </div>
            </label>
          </div>
          <div class="reset-row"><button type="button" id="reset">Reset</button></div>
        </div>
      </details>
    </div>

    <section class="clock">
      <div class="tile">
        <div class="number" id="hour">--</div>
        <div class="caption" id="period">AM</div>
      </div>
      <div class="tile">
        <div class="number" id="minute">--</div>
        <div class="caption" id="weekday">Monday</div>
      </div>
    </section>
    <div class="date" id="date-line">Loading</div>
  </main>

  <script>
    const key = "n-clock-widget-settings";
    const defaults = {
      timeFormat: "12",
      font: "serif",
      style: "split",
      size: 100,
      textColor: "#ffffff",
      backColor: "#c7b29f",
      pageColor: "#fbfaf7"
    };
    const fonts = {
      serif: 'Georgia, "Times New Roman", serif',
      modern: '"Helvetica Neue", Arial, sans-serif',
      mono: '"Courier New", monospace'
    };

    function validHex(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(value || "") ? value : fallback;
    }

    function validSize(value, fallback = defaults.size) {
      const size = Number(value);
      if (!Number.isFinite(size)) return fallback;
      return Math.min(140, Math.max(55, Math.round(size)));
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(key) || "{}");
        return {
          ...defaults,
          ...saved,
          size: validSize(saved.size),
          textColor: validHex(saved.textColor, defaults.textColor),
          backColor: validHex(saved.backColor, defaults.backColor),
          pageColor: validHex(saved.pageColor, defaults.pageColor)
        };
      } catch (_) {
        return { ...defaults };
      }
    }

    let settings = load();

    function save() {
      localStorage.setItem(key, JSON.stringify(settings));
    }

    function apply() {
      document.documentElement.style.setProperty("--card-ink", settings.textColor);
      document.documentElement.style.setProperty("--card", settings.backColor);
      document.documentElement.style.setProperty("--paper", settings.pageColor);
      document.documentElement.style.setProperty("--font", fonts[settings.font] || fonts.serif);
      document.documentElement.style.setProperty("--scale", settings.size / 100);
      document.body.classList.toggle("style-minimal", settings.style === "minimal");
      document.getElementById("time-format").value = settings.timeFormat;
      document.getElementById("font").value = settings.font;
      document.getElementById("style").value = settings.style;
      document.getElementById("size").value = settings.size;
      document.getElementById("text-color").value = settings.textColor;
      document.getElementById("back-color").value = settings.backColor;
      document.getElementById("page-color").value = settings.pageColor;
    }

    function updateClock() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Tokyo",
        hour: settings.timeFormat === "12" ? "numeric" : "2-digit",
        minute: "2-digit",
        hour12: settings.timeFormat === "12"
      }).formatToParts(now);
      const hour = parts.find((part) => part.type === "hour").value.padStart(2, "0");
      const minute = parts.find((part) => part.type === "minute").value;
      const period = parts.find((part) => part.type === "dayPeriod");

      document.getElementById("hour").textContent = hour;
      document.getElementById("minute").textContent = minute;
      document.getElementById("period").textContent = settings.timeFormat === "12" && period ? period.value : "24H";
      document.getElementById("weekday").textContent = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Tokyo",
        weekday: "long"
      }).format(now);
      document.getElementById("date-line").textContent = new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(now);
    }

    async function pickColor(id) {
      if (!window.EyeDropper) {
        document.getElementById(id).click();
        return;
      }
      try {
        const result = await new EyeDropper().open();
        document.getElementById(id).value = result.sRGBHex;
        document.getElementById(id).dispatchEvent(new Event("input", { bubbles: true }));
      } catch (_) {}
    }

    ["time-format", "font", "style", "size", "text-color", "back-color", "page-color"].forEach((id) => {
      const input = document.getElementById(id);
      input.addEventListener(input.type === "color" ? "input" : "change", () => {
        const map = {
          "time-format": "timeFormat",
          font: "font",
          style: "style",
          size: "size",
          "text-color": "textColor",
          "back-color": "backColor",
          "page-color": "pageColor"
        };
        settings = { ...settings, [map[id]]: id === "size" ? validSize(input.value) : input.value };
        apply();
        updateClock();
        save();
      });
    });

    document.querySelectorAll("[data-pick]").forEach((button) => {
      button.addEventListener("click", () => pickColor(button.dataset.pick));
    });

    document.getElementById("reset").addEventListener("click", () => {
      settings = { ...defaults };
      apply();
      updateClock();
      save();
    });

    apply();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
