<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>N Calendar Widget</title>
  <style>
    :root {
      --ink: #2f3130;
      --muted: rgba(47, 49, 48, 0.52);
      --paper: #fbfaf7;
      --calendar: #e8e3db;
      --accent: #a89f95;
      --accent-ink: #ffffff;
      --sun: #b58d86;
      --sat: #7e9094;
      --border: rgba(47, 49, 48, 0.1);
      --font: Georgia, "Times New Roman", serif;
      --shadow: 0 18px 40px rgba(47, 49, 48, 0.08);
      --scale: 1;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: var(--ink);
      font-family: var(--font);
      letter-spacing: 0;
    }

    body { padding: calc(12px * var(--scale)); }

    .widget {
      width: min(100%, calc(360px * var(--scale)));
      margin: 0 auto;
      padding: calc(18px * var(--scale));
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .nav {
      display: flex;
      gap: 6px;
    }

    button,
    summary {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font: inherit;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }

    button { min-width: 30px; min-height: 30px; }

    summary {
      list-style: none;
      padding: 7px 11px;
    }

    summary::-webkit-details-marker { display: none; }
    details { position: relative; z-index: 2; }

    .settings {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      width: min(360px, calc(100vw - 34px));
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    label span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
    }

    select,
    input[type="number"],
    input[type="color"] {
      width: 100%;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
    }

    select,
    input[type="number"] { padding: 0 8px; }
    input[type="color"] { padding: 3px; cursor: pointer; }

    .color-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 6px;
    }

    .reset-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 9px;
    }

    .reset-row button {
      padding: 7px 12px;
      font-size: 11px;
    }

    .calendar {
      padding: calc(22px * var(--scale)) calc(20px * var(--scale)) calc(20px * var(--scale));
      border-radius: 8px;
      background: var(--calendar);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .month {
      margin-bottom: calc(16px * var(--scale));
      text-align: center;
      font-size: calc(13px * var(--scale));
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: calc(8px * var(--scale)) calc(9px * var(--scale));
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .dow {
      color: var(--ink);
      font-size: calc(10px * var(--scale));
      font-weight: 700;
      opacity: 0.78;
    }

    .dow.weekend-sun,
    .day.weekend-sun:not(.today) {
      color: var(--sun);
    }

    .dow.weekend-sat,
    .day.weekend-sat:not(.today) {
      color: var(--sat);
    }

    .day {
      min-height: calc(24px * var(--scale));
      display: grid;
      place-items: center;
      border-radius: 5px;
      color: var(--ink);
      font-size: calc(12px * var(--scale));
    }

    .outside { opacity: 0.28; }

    .today {
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 800;
    }

    @media (max-width: 340px) {
      body { padding: 8px; }
      .widget { padding: 12px; }
      .settings-grid { grid-template-columns: 1fr; }
      .calendar { padding: 18px 14px; }
      .grid { gap: 7px 6px; }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Calendar widget">
    <div class="toolbar">
      <div class="nav">
        <button type="button" id="prev" aria-label="Previous month">‹</button>
        <button type="button" id="today">Today</button>
        <button type="button" id="next" aria-label="Next month">›</button>
      </div>
      <details>
        <summary>Settings</summary>
        <div class="settings">
          <div class="settings-grid">
            <label>
              <span>Font</span>
              <select id="font">
                <option value="serif">Serif</option>
                <option value="modern">Modern</option>
                <option value="mono">Mono</option>
              </select>
            </label>
            <label>
              <span>Week Start</span>
              <select id="week-start">
                <option value="mon">Monday</option>
                <option value="sun">Sunday</option>
              </select>
            </label>
            <label>
              <span>Size %</span>
              <input id="size" type="number" min="55" max="140" step="1" />
            </label>
            <label>
              <span>Text</span>
              <div class="color-row">
                <input id="text-color" type="color" />
                <button type="button" data-pick="text-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Calendar Back</span>
              <div class="color-row">
                <input id="calendar-color" type="color" />
                <button type="button" data-pick="calendar-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Today</span>
              <div class="color-row">
                <input id="accent-color" type="color" />
                <button type="button" data-pick="accent-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Sunday</span>
              <div class="color-row">
                <input id="sun-color" type="color" />
                <button type="button" data-pick="sun-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Saturday</span>
              <div class="color-row">
                <input id="sat-color" type="color" />
                <button type="button" data-pick="sat-color" title="Pick color">⌖</button>
              </div>
            </label>
            <label>
              <span>Page</span>
              <div class="color-row">
                <input id="page-color" type="color" />
                <button type="button" data-pick="page-color" title="Pick color">⌖</button>
              </div>
            </label>
          </div>
          <div class="reset-row"><button type="button" id="reset">Reset</button></div>
        </div>
      </details>
    </div>

    <section class="calendar">
      <div class="month" id="month-label">Loading</div>
      <div class="grid" id="calendar-grid"></div>
    </section>
  </main>

  <script>
    const key = "n-calendar-widget-settings-v3";
    const defaults = {
      font: "serif",
      weekStart: "sun",
      size: 72,
      textColor: "#2f3130",
      calendarColor: "#e8e3db",
      accentColor: "#a89f95",
      sunColor: "#b58d86",
      satColor: "#7e9094",
      pageColor: "#fbfaf7"
    };
    const fonts = {
      serif: 'Georgia, "Times New Roman", serif',
      modern: '"Helvetica Neue", Arial, sans-serif',
      mono: '"Courier New", monospace'
    };

    const today = new Date();
    let cursor = new Date(today.getFullYear(), today.getMonth(), 1);

    function validHex(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(value || "") ? value : fallback;
    }

    function validSize(value, fallback = defaults.size) {
      const size = Number(value);
      if (!Number.isFinite(size)) return fallback;
      return Math.min(140, Math.max(55, Math.round(size)));
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(key) || "{}");
        return {
          ...defaults,
          ...saved,
          size: validSize(saved.size),
          textColor: validHex(saved.textColor, defaults.textColor),
          calendarColor: validHex(saved.calendarColor, defaults.calendarColor),
          accentColor: validHex(saved.accentColor, defaults.accentColor),
          sunColor: validHex(saved.sunColor, defaults.sunColor),
          satColor: validHex(saved.satColor, defaults.satColor),
          pageColor: validHex(saved.pageColor, defaults.pageColor)
        };
      } catch (_) {
        return { ...defaults };
      }
    }

    let settings = load();

    function save() {
      localStorage.setItem(key, JSON.stringify(settings));
    }

    function apply() {
      document.documentElement.style.setProperty("--ink", settings.textColor);
      document.documentElement.style.setProperty("--calendar", settings.calendarColor);
      document.documentElement.style.setProperty("--accent", settings.accentColor);
      document.documentElement.style.setProperty("--sun", settings.sunColor);
      document.documentElement.style.setProperty("--sat", settings.satColor);
      document.documentElement.style.setProperty("--paper", settings.pageColor);
      document.documentElement.style.setProperty("--font", fonts[settings.font] || fonts.serif);
      document.documentElement.style.setProperty("--scale", settings.size / 100);
      document.getElementById("font").value = settings.font;
      document.getElementById("week-start").value = settings.weekStart;
      document.getElementById("size").value = settings.size;
      document.getElementById("text-color").value = settings.textColor;
      document.getElementById("calendar-color").value = settings.calendarColor;
      document.getElementById("accent-color").value = settings.accentColor;
      document.getElementById("sun-color").value = settings.sunColor;
      document.getElementById("sat-color").value = settings.satColor;
      document.getElementById("page-color").value = settings.pageColor;
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function render() {
      const grid = document.getElementById("calendar-grid");
      const firstDay = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
      const month = cursor.getMonth();
      const startOffset = settings.weekStart === "mon"
        ? (firstDay.getDay() + 6) % 7
        : firstDay.getDay();
      const start = new Date(firstDay);
      start.setDate(1 - startOffset);
      const days = settings.weekStart === "mon"
        ? [
            ["Mon", ""],
            ["Tue", ""],
            ["Wed", ""],
            ["Thu", ""],
            ["Fri", ""],
            ["Sat", "weekend-sat"],
            ["Sun", "weekend-sun"]
          ]
        : [
            ["Sun", "weekend-sun"],
            ["Mon", ""],
            ["Tue", ""],
            ["Wed", ""],
            ["Thu", ""],
            ["Fri", ""],
            ["Sat", "weekend-sat"]
          ];

      document.getElementById("month-label").textContent = new Intl.DateTimeFormat("en-US", {
        month: "long",
        year: "numeric"
      }).format(cursor);

      grid.innerHTML = [
        ...days.map(([day, weekendClass]) => `<div class="dow ${weekendClass}">${day}</div>`),
        ...Array.from({ length: 42 }, (_, index) => {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          const classes = ["day"];
          if (date.getMonth() !== month) classes.push("outside");
          if (date.getDay() === 0) classes.push("weekend-sun");
          if (date.getDay() === 6) classes.push("weekend-sat");
          if (sameDay(date, today)) classes.push("today");
          return `<div class="${classes.join(" ")}">${date.getDate()}</div>`;
        })
      ].join("");
    }

    async function pickColor(id) {
      if (!window.EyeDropper) {
        document.getElementById(id).click();
        return;
      }
      try {
        const result = await new EyeDropper().open();
        document.getElementById(id).value = result.sRGBHex;
        document.getElementById(id).dispatchEvent(new Event("input", { bubbles: true }));
      } catch (_) {}
    }

    ["font", "week-start", "size", "text-color", "calendar-color", "accent-color", "sun-color", "sat-color", "page-color"].forEach((id) => {
      const input = document.getElementById(id);
      input.addEventListener(input.type === "color" ? "input" : "change", () => {
        const map = {
          font: "font",
          "week-start": "weekStart",
          size: "size",
          "text-color": "textColor",
          "calendar-color": "calendarColor",
          "accent-color": "accentColor",
          "sun-color": "sunColor",
          "sat-color": "satColor",
          "page-color": "pageColor"
        };
        settings = { ...settings, [map[id]]: id === "size" ? validSize(input.value) : input.value };
        apply();
        render();
        save();
      });
    });

    document.querySelectorAll("[data-pick]").forEach((button) => {
      button.addEventListener("click", () => pickColor(button.dataset.pick));
    });

    document.getElementById("prev").addEventListener("click", () => {
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1);
      render();
    });
    document.getElementById("next").addEventListener("click", () => {
      cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
      render();
    });
    document.getElementById("today").addEventListener("click", () => {
      cursor = new Date(today.getFullYear(), today.getMonth(), 1);
      render();
    });
    document.getElementById("reset").addEventListener("click", () => {
      settings = { ...defaults };
      apply();
      render();
      save();
    });

    apply();
    render();
  </script>
</body>
</html>
